<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>Continuum: Injury Management Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--navy:#0E1B2C;--gold:#C8972F;--ink:#16202E;--muted:#5E6B7C;--line:#E4E8F0;--bg:#F3F5F9;--card:#FFFFFF;
--ld:#C8972F;--tr:#1F3557;--mw:#3E9A64;--aw:#9AA5B4;--good:#3E9A64;--sideink:#E9EEF6;--sidemut:#8FA0B8}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font:13.5px/1.5 Inter,system-ui,sans-serif;-webkit-font-smoothing:antialiased}
a{color:var(--gold)}
.layout{display:flex;min-height:100vh}
/* sidebar */
.side{width:236px;flex-shrink:0;background:var(--navy);color:var(--sideink);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto}
.side .logo{display:flex;gap:10px;align-items:center;padding:20px 18px 16px}
.side .mark{width:30px;height:30px;border:2px solid var(--gold);border-radius:8px;transform:rotate(45deg);display:flex;align-items:center;justify-content:center}
.side .mark span{width:10px;height:10px;background:var(--gold);border-radius:2px}
.side .lt b{font-family:"Space Grotesk";font-size:15px;letter-spacing:.04em;display:block}
.side .lt i{font-style:normal;font-size:10.5px;color:var(--sidemut)}
.side .grp{padding:14px 18px 4px;font-family:"Space Grotesk";font-size:10px;font-weight:600;letter-spacing:.14em;color:var(--sidemut);text-transform:uppercase}
.side button{display:flex;align-items:center;gap:9px;width:100%;text-align:left;background:none;border:none;color:var(--sidemut);font:inherit;font-size:13px;padding:9px 18px;cursor:pointer;border-left:3px solid transparent}
.side button:hover{color:var(--sideink)}
.side button.on{color:var(--sideink);background:rgba(255,255,255,.06);border-left-color:var(--gold);font-weight:600}
.side .dot{width:5px;height:5px;border-radius:50%;background:currentColor;opacity:.55;flex-shrink:0}
.side .help{margin:auto 14px 10px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:12px 14px}
.side .help b{font-size:13px}.side .help p{font-size:11.5px;color:var(--sidemut);margin-top:2px}
.side .cpy{padding:0 18px 16px;font-size:10.5px;color:var(--sidemut)}
/* main */
.main{flex:1;min-width:0;padding:22px 26px 40px}
.kicker{color:var(--gold);font-family:"Space Grotesk";font-weight:600;font-size:11px;letter-spacing:.14em;text-transform:uppercase}
.pagehead{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;flex-wrap:wrap;margin-bottom:16px}
h1{font-family:"Space Grotesk";font-size:26px;letter-spacing:-.01em;margin:4px 0 2px}
h1 .g{color:var(--gold)}
.sub{color:var(--muted);font-size:13px}
.htools{text-align:right}
.htools .range{font-family:"Space Grotesk";font-weight:600;font-size:13px}
.htools .who{color:var(--muted);font-size:11.5px;margin:2px 0 10px}
.btn{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:9px 14px;font:inherit;font-weight:600;font-size:12.5px;cursor:pointer;color:var(--ink)}
.btn:hover{border-color:var(--gold)}
.btn.gold{background:var(--gold);border-color:var(--gold);color:#14100a}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px 18px}
.cardhead{font-family:"Space Grotesk";font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;display:flex;justify-content:space-between;align-items:baseline;gap:8px}
.grid{display:grid;gap:12px}
.kpis{grid-template-columns:repeat(6,1fr)}
.row2{grid-template-columns:1.1fr 1.1fr 1.1fr .9fr}
.row3{grid-template-columns:1.2fr 1.2fr 1.2fr .8fr}
@media(max-width:1280px){.kpis{grid-template-columns:repeat(3,1fr)}.row2,.row3{grid-template-columns:1fr 1fr}}
@media(max-width:820px){.kpis,.row2,.row3{grid-template-columns:1fr}.side{display:none}}
.kpi .n{font-family:"Space Grotesk";font-size:26px;font-weight:700}
.kpi .d{font-size:11px;margin-top:2px}
.up{color:var(--good)}.down{color:var(--good)}.warn{color:#B0722F}
.legend{list-style:none}
.legend li{display:flex;align-items:center;gap:8px;padding:4px 0;font-size:12.5px;cursor:pointer}
.legend li:hover{color:var(--gold)}
.legend .sw{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.legend b{margin-left:auto}
.legend span.pct{color:var(--muted);font-size:11.5px;width:44px;text-align:right}
.chip{display:inline-block;font-family:"Space Grotesk";font-size:10.5px;font-weight:700;letter-spacing:.04em;border-radius:999px;padding:4px 11px;white-space:nowrap}
.c-light_duty{background:rgba(200,151,47,.14);color:#8a6414}
.c-treating{background:rgba(31,53,87,.12);color:#1F3557}
.c-modified{background:rgba(62,154,100,.14);color:#2c6e46}
.c-awaiting{background:rgba(154,165,180,.2);color:#5E6B7C}
.c-returned{background:rgba(62,154,100,.18);color:#2c6e46}
table{width:100%;border-collapse:collapse}
th{font-family:"Space Grotesk";font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);text-align:left;padding:8px 10px;border-bottom:1px solid var(--line)}
td{padding:10px;border-bottom:1px solid var(--line);vertical-align:middle;font-size:12.5px}
tr.rowlink{cursor:pointer}
tr.rowlink:hover td{background:#FAF7EF}
.pbar{height:6px;border-radius:3px;background:var(--line);overflow:hidden;min-width:70px}
.pbar i{display:block;height:6px;background:var(--gold);border-radius:3px;transition:width .6s cubic-bezier(.2,.8,.2,1)}
.pbar.full i{background:var(--good)}
.tfoot{color:var(--muted);font-size:11.5px;padding-top:10px}
.insight{display:flex;gap:10px;padding:9px 0;border-bottom:1px solid var(--line)}
.insight:last-child{border-bottom:none}
.insight .ic{width:10px;height:10px;border-radius:50%;margin-top:4px;flex-shrink:0}
.insight b{display:block;font-size:12.5px}
.insight span{color:var(--muted);font-size:11.5px}
.money{font-family:"Space Grotesk";font-size:24px;font-weight:700}
.bars .brow{margin:8px 0}
.bars .bl{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px}
.bars .bl b{color:var(--muted);font-weight:500}
.bars .bt{height:8px;border-radius:4px;background:var(--line);overflow:hidden}
.bars .bt i{display:block;height:8px;border-radius:4px;transition:width .7s cubic-bezier(.2,.8,.2,1)}
.filterbar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;align-items:center}
.fchip{border:1px solid var(--line);background:var(--card);border-radius:999px;padding:6px 13px;font-size:12px;cursor:pointer}
.fchip.on{border-color:var(--gold);color:#8a6414;background:rgba(200,151,47,.1);font-weight:600}
input[type=search],input[type=text],textarea,select{font:inherit;border:1px solid var(--line);border-radius:10px;padding:9px 12px;background:var(--card);color:var(--ink);outline:none}
input:focus,textarea:focus{border-color:var(--gold)}
/* drawer */
.scrim{position:fixed;inset:0;background:rgba(14,27,44,.35);opacity:0;pointer-events:none;transition:opacity .25s;z-index:40}
.scrim.on{opacity:1;pointer-events:auto}
.drawer{position:fixed;top:0;right:-460px;width:440px;max-width:94vw;height:100vh;background:var(--card);border-left:1px solid var(--line);z-index:50;transition:right .3s cubic-bezier(.2,.8,.2,1);overflow-y:auto;padding:22px}
.drawer.on{right:0}
.ghost{display:inline-block;border:1px dashed var(--line);border-radius:8px;padding:5px 10px;color:var(--aw);font-size:11.5px;text-decoration:line-through;margin:0 6px 6px 0}
.toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);background:var(--navy);color:var(--sideink);border-radius:12px;padding:11px 18px;font-size:12.5px;opacity:0;transition:all .3s;z-index:60;pointer-events:none}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
.toast b{color:var(--gold)}
section.view{display:none}section.view.on{display:block}
.notecard{border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:10px}
.notecard .meta{color:var(--muted);font-size:11px;margin-bottom:4px}
.admin-row{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--line)}
.admin-row:last-child{border-bottom:none}
.pill{font-size:10.5px;font-weight:700;border-radius:999px;padding:3px 10px;background:rgba(62,154,100,.14);color:#2c6e46}
.pill.off{background:rgba(154,165,180,.2);color:var(--muted)}
:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
@media print{.side,.htools,.scrim,.drawer,.toast{display:none !important}.main{padding:0}.card{break-inside:avoid}}
/* 13b live worker feed */
.livechip{display:inline-block;font-family:"Space Grotesk";font-size:10.5px;font-weight:700;letter-spacing:.04em;color:#8a6414;background:rgba(200,151,47,.16);border:1px solid rgba(200,151,47,.4);border-radius:999px;padding:4px 11px;margin-bottom:6px;animation:feedbreathe 2.4s ease-in-out infinite}
@keyframes feedbreathe{0%,100%{box-shadow:0 0 0 rgba(200,151,47,0)}50%{box-shadow:0 0 14px rgba(200,151,47,.5)}}
.live-badge{display:inline-block;font-family:"Space Grotesk";font-size:9.5px;font-weight:700;letter-spacing:.06em;color:#8a6414;background:rgba(200,151,47,.18);border-radius:4px;padding:1px 6px;margin-left:6px;vertical-align:middle}
.rev-tag{display:inline-block;font-size:10.5px;color:var(--muted);margin-left:4px}
@media(prefers-reduced-motion:reduce){.livechip{animation:none}}
</style>
</head>
<body>

<script>
"use strict";
var WORKERS=[
{name:"Michael Thompson",role:"Equipment operator",injury:"Lower back strain",cat:"back",days:21,status:"light_duty",restr:"No lifting over 20 lbs, no repetitive bending",review:"Jun 30, 2026",rtw:75,visits:3,loc:"Warehouse A"},
{name:"Jason Miller",role:"Warehouse worker",injury:"Right shoulder sprain",cat:"shoulder",days:17,status:"light_duty",restr:"No overhead lifting, no pushing over 30 lbs",review:"Jun 28, 2026",rtw:50,visits:2,loc:"Warehouse A"},
{name:"Sarah Johnson",role:"Material handler",injury:"Left knee strain",cat:"knee",days:13,status:"treating",restr:"No squatting, no climbing ladders",review:"Jun 26, 2026",rtw:25,visits:2,loc:"Site B"},
{name:"David Martinez",role:"Driver",injury:"Neck strain",cat:"back",days:25,status:"modified",restr:"Limited range of motion, no long-distance driving",review:"Jul 3, 2026",rtw:80,visits:3,loc:"Field Crew"},
{name:"Lisa Anderson",role:"Packer",injury:"Wrist tendonitis",cat:"hand",days:9,status:"light_duty",restr:"No repetitive gripping, use ergonomic tools",review:"Jun 27, 2026",rtw:30,visits:2,loc:"Warehouse A"},
{name:"Kevin O'Brien",role:"Scaffolder",injury:"Right ankle sprain",cat:"strain",days:11,status:"light_duty",restr:"Ground-level work only, no ladders or scaffolds",review:"Jun 29, 2026",rtw:40,visits:2,loc:"Site B"},
{name:"Amanda Clark",role:"Welder",injury:"Elbow tendonitis",cat:"other",days:19,status:"treating",restr:"No repetitive tool use beyond 10 minutes",review:"Jul 1, 2026",rtw:35,visits:3,loc:"Field Crew"},
{name:"Robert Singh",role:"Millwright",injury:"Shoulder strain",cat:"shoulder",days:27,status:"modified",restr:"No work above shoulder height",review:"Jul 4, 2026",rtw:85,visits:3,loc:"Warehouse C"},
{name:"Priya Sharma",role:"Labourer",injury:"Wrist strain",cat:"strain",days:2,status:"awaiting",restr:"Awaiting assessment",review:"Jun 24, 2026",rtw:5,visits:1,loc:"Warehouse A"},
{name:"Tom Kowalski",role:"Forklift operator",injury:"Ankle sprain",cat:"strain",days:3,status:"light_duty",restr:"Seated tasks preferred",review:"Jun 25, 2026",rtw:15,visits:1,loc:"Site B"},
{name:"Grace Fontaine",role:"Assembler",injury:"Finger strain",cat:"strain",days:4,status:"light_duty",restr:"No fine repetitive gripping",review:"Jun 25, 2026",rtw:15,visits:1,loc:"Warehouse A"},
{name:"Ahmed Hassan",role:"Shipper",injury:"Hip strain",cat:"strain",days:5,status:"treating",restr:"No prolonged standing",review:"Jun 26, 2026",rtw:10,visits:2,loc:"Other"},
{name:"Marc Boucher",role:"Rigger",injury:"Calf strain",cat:"strain",days:5,status:"light_duty",restr:"Ground-level work only",review:"Jun 26, 2026",rtw:20,visits:1,loc:"Field Crew"},
{name:"Elena Petrov",role:"Picker",injury:"Shoulder strain",cat:"strain",days:6,status:"treating",restr:"No overhead reach",review:"Jun 27, 2026",rtw:20,visits:1,loc:"Warehouse A"},
{name:"Dan Cardinal",role:"Yard hand",injury:"Groin strain",cat:"strain",days:7,status:"light_duty",restr:"No heavy pushing or pulling",review:"Jun 27, 2026",rtw:25,visits:1,loc:"Other"},
{name:"Sofia Ricci",role:"Inspector",injury:"Low back strain",cat:"back",days:10,status:"treating",restr:"No lifting over 15 lbs",review:"Jun 28, 2026",rtw:35,visits:2,loc:"Warehouse C"},
{name:"James Whitefeather",role:"Loader",injury:"Knee strain",cat:"knee",days:12,status:"treating",restr:"No kneeling or squatting",review:"Jun 29, 2026",rtw:30,visits:2,loc:"Site B"},
{name:"Nina Olsen",role:"Sorter",injury:"Thumb strain",cat:"hand",days:14,status:"light_duty",restr:"Use adaptive tooling",review:"Jun 30, 2026",rtw:45,visits:2,loc:"Warehouse A"},
{name:"Carlos Mendez",role:"Maintenance",injury:"Back strain",cat:"back",days:18,status:"light_duty",restr:"No lifting over 20 lbs",review:"Jul 1, 2026",rtw:55,visits:2,loc:"Warehouse C"},
{name:"Ruth Adeyemi",role:"Machine operator",injury:"Shoulder strain",cat:"shoulder",days:22,status:"light_duty",restr:"No work above chest height",review:"Jul 2, 2026",rtw:60,visits:3,loc:"Warehouse C"},
{name:"Peter Novak",role:"Electrician helper",injury:"Hamstring strain",cat:"strain",days:26,status:"light_duty",restr:"Limited climbing",review:"Jul 3, 2026",rtw:65,visits:3,loc:"Field Crew"},
{name:"Fatima Zahra",role:"Cleaner",injury:"Elbow strain",cat:"strain",days:29,status:"light_duty",restr:"No repetitive wiping motions",review:"Jul 4, 2026",rtw:70,visits:3,loc:"Other"},
{name:"Bill Sawchuk",role:"Carpenter",injury:"Back strain",cat:"back",days:35,status:"light_duty",restr:"No lifting over 10 lbs",review:"Jul 5, 2026",rtw:70,visits:3,loc:"Site B"},
{name:"Amara Diallo",role:"Press operator",injury:"Shoulder strain",cat:"shoulder",days:45,status:"light_duty",restr:"One-handed tasks only",review:"Jul 6, 2026",rtw:75,visits:3,loc:"Warehouse A"},
{name:"Glen MacIsaac",role:"Boilermaker",injury:"Knee strain",cat:"knee",days:52,status:"modified",restr:"Seated work station",review:"Jul 7, 2026",rtw:80,visits:4,loc:"Field Crew"},
{name:"Ivy Chen",role:"Technician",injury:"Strain, multiple",cat:"strain",days:58,status:"light_duty",restr:"Half days, light bench work",review:"Jul 8, 2026",rtw:80,visits:3,loc:"Warehouse A"},
{name:"Ray Desjarlais",role:"Warehouse lead",injury:"Back strain",cat:"back",days:75,status:"light_duty",restr:"Supervisory duties only",review:"Jul 10, 2026",rtw:85,visits:3,loc:"Site B"},
{name:"Mia Tremblay",role:"Order builder",injury:"Other, gradual onset",cat:"other",days:102,status:"light_duty",restr:"Administrative duties",review:"Jul 12, 2026",rtw:90,visits:3,loc:"Other"}
];

var LSKEY="continuum_employer_v1";
var STATUS_META={light_duty:["Light duty","var(--ld)"],treating:["Treating","var(--tr)"],modified:["Modified work","var(--mw)"],awaiting:["Awaiting review","var(--aw)"],returned:["Returned","var(--good)"]};
var CAT_META={strain:["Strain / sprain","#C8972F"],back:["Back / spine","#1F3557"],shoulder:["Shoulder","#B0722F"],knee:["Knee / leg","#3E9A64"],hand:["Hand / wrist","#C87B2F"],other:["Other","#9AA5B4"]};
var NAV=[["overview","Overview",null],
["_g","INJURY MANAGEMENT",null],
["workers","Injured Workers","g"],["claims","Claims & Documentation","g"],["rtw","Return to Work","g"],["visits","Doctor Visits","g"],["notes","Case Notes","g"],
["_g2","ANALYTICS",null],
["dashboards","Dashboards","g"],["reports","Reports","g"],["trends","Trends","g"],["benchmarking","Benchmarking","g"],
["_g3","ADMIN",null],
["users","Users & Roles","g"],["settings","Settings","g"],["integrations","Integrations","g"]];
var S;
function freshState(){return {workers:JSON.parse(JSON.stringify(WORKERS)),returned:[],section:"overview",filter:null,search:"",notes:[
 {who:"K. Morgan", when:"Jun 27, 2026", worker:"David Martinez", text:"Route adjusted to local deliveries only. Duties confirmed manageable."},
 {who:"Site HSE", when:"Jun 26, 2026", worker:"Kevin O'Brien", text:"Ground-level staging assigned. Hazard check complete."}
]};}
function load(){try{var raw=localStorage.getItem(LSKEY);if(raw){var s=JSON.parse(raw);if(s&&s.workers){S=s;return;}}}catch(e){}S=freshState();}
function save(){try{localStorage.setItem(LSKEY,JSON.stringify(S));}catch(e){}render();}
function resetAll(){S=freshState();toast("Demo data <b>reset</b>");save();}
function esc(t){return String(t).replace(/[&<>"]/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];});}
function toast(html){var el=document.getElementById("toast");el.innerHTML=html;el.classList.add("on");clearTimeout(el._t);el._t=setTimeout(function(){el.classList.remove("on");},2600);}
/* ---------- 13b: live worker feed read across the functional-only bridge ---------- */
var LIVE=null, prevCheckedIn=false, prevTs=null;
function mapStatus(s){return {reported:"awaiting",off_work:"treating",light_duty:"light_duty",full_duty_pending:"modified",signed_off:"returned",escalated:"awaiting"}[s]||"treating";}
function liveRtw(b){
 if(b.status==="signed_off") return 100;
 var base={reported:5,off_work:20,light_duty:55,full_duty_pending:88,escalated:45}[b.status]||40;
 var duty=b.dutiesTotal>0?Math.round(b.dutiesDone/b.dutiesTotal*20):0;
 return Math.min(95,base+duty);
}
function readBridge(){
 var raw=null; try{raw=localStorage.getItem("continuum_worker_bridge_v1");}catch(e){}
 var b=null; if(raw){ try{b=JSON.parse(raw);}catch(e){} }
 if(!b || !b.consented){ var had=LIVE; LIVE=null; prevCheckedIn=false; prevTs=null; if(had) render(); return; }
 var mapped=mapStatus(b.status);
 var nl={name:b.name||"Marcus Bedard", role:b.trade||"Scaffolder", injury:b.injury||"Shoulder strain",
   cat:"shoulder", days:b.day||0, status:mapped, restr:b.restr||"", review:"Live",
   rtw:liveRtw(b), visits:0, loc:"Field Crew", live:true,
   clinicianReviewing:(b.status==="escalated"||!!b.escalated)};
 if(b.checkedInToday && !prevCheckedIn && prevTs!==null){
   var nm=b.name||"Marcus Bedard"; var parts=nm.split(" ");
   toast("<b>"+esc(parts[0]+" "+((parts[1]||"")[0]||""))+"</b> completed a check-in, live from the worker app");
 }
 prevCheckedIn=!!b.checkedInToday; prevTs=b.ts; LIVE=nl; render();
}
function returnedList(){ return (LIVE&&LIVE.status==="returned") ? S.returned.concat([LIVE]) : S.returned; }
/* ---------- aggregations (single source: S.workers plus the live feed) ---------- */
function actives(){ return (LIVE && LIVE.status!=="returned") ? S.workers.concat([LIVE]) : S.workers; }
function counts(){var c={light_duty:0,treating:0,modified:0,awaiting:0};actives().forEach(function(w){c[w.status]++;});return c;}
function catCounts(){var c={};actives().forEach(function(w){c[w.cat]=(c[w.cat]||0)+1;});return c;}
function bucketCounts(){var b={"0 to 7 days":0,"8 to 14 days":0,"15 to 30 days":0,"31 to 60 days":0,"60+ days":0};
 actives().forEach(function(w){var d=w.days;b[d<=7?"0 to 7 days":d<=14?"8 to 14 days":d<=30?"15 to 30 days":d<=60?"31 to 60 days":"60+ days"]++;});return b;}
function locCounts(){var c={};actives().forEach(function(w){c[w.loc]=(c[w.loc]||0)+1;});return c;}
function totalVisits(){return actives().reduce(function(a,w){return a+w.visits;},0)+S.returned.reduce(function(a,w){return a+w.visits;},0);}
function avgDays(){var a=actives();return a.length?Math.round(a.reduce(function(x,w){return x+w.days;},0)/a.length):0;}
function newThisWeek(){return actives().filter(function(w){return w.days<=5;}).length;}
function rtwRate(){var base=76,bump=S.returned.length+((LIVE&&LIVE.status==="returned")?1:0);return Math.min(99,base+bump);}
function costEst(){return 142680-S.returned.length*4980;}
function timeLoss(){return 624-S.returned.length*22;}
/* ---------- svg helpers ---------- */
function donut(segs,total,size,hole,center){
 var r=(size-hole)/2-2,cx=size/2,cy=size/2,C=2*Math.PI*r,acc=0,paths="";
 segs.forEach(function(s){var frac=total?s.v/total:0;
  paths+='<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="'+s.c+'" stroke-width="'+hole+'" stroke-dasharray="'+(frac*C)+' '+(C-frac*C)+'" stroke-dashoffset="'+(-acc*C+C/4)+'" style="transition:stroke-dasharray .7s"/>';

 return '<svg width="'+size+'" height="'+size+'" viewBox="0 0 '+size+' '+size+'" role="img" shape-rendering="geometricPrecision">'+paths+

function spark(vals,w,h,color,fill){

  ready.map(function(w){var i=S.workers.indexOf(w);

 var rl2=returnedList(); if(rl2.length){h+='<div class="card" style="margin-top:12px"><div class="cardhead">Returned this period &middot; '+rl2.length+'</div>'+
  rl2.map(function(w){return '<div class="admin-row"><b>'+esc(w.name)+'</b>'+(w.live?'<span class="live-badge">Live</span>':'')+'<span class="chip c-returned">Returned</span></div>';}).join("")+'</div>';}
 return h;}
function renderVisits(){
 var h=pagehead("Injury management","Doctor Visits","Visit counts this period, no clinical content");
 h+='<div class="grid kpis" style="grid-template-columns:repeat(3,1fr)">'+
 kpiCard("Total visits",totalVisits(),"this period")+
 kpiCard("Avg per active case",(totalVisits()/Math.max(1,actives().length)).toFixed(1),"visits")+
 kpiCard("Cases with 3+ visits",actives().filter(function(w){return w.visits>=3;}).length,"of "+actives().length+" active")+'</div>';
 h+='<div class="card" style="margin-top:12px"><table><thead><tr><th>Worker</th><th>Status</th><th>Visits</th><th>Next review</th></tr></thead><tbody>'+
 actives().slice().sort(function(a,b){return b.visits-a.visits;}).map(function(w){var i=S.workers.indexOf(w);
  return '<tr class="rowlink" onclick="openDrawer('+i+')"><td><b>'+esc(w.name)+'</b></td><td>'+chipFor(w.status)+'</td><td>'+w.visits+'</td><td>'+esc(w.review)+'</td></tr>';}).join("")+
 '</tbody></table><div class="tfoot">Counts only. What happens inside a visit stays at the clinic.</div></div>';
 return h;}
function renderNotes(){
 var h=pagehead("Injury management","Case Notes","Functional coordination notes, never medical detail");
 h+='<div class="card" style="margin-bottom:12px"><div class="cardhead">Add a note</div>'+
 '<div style="display:flex;gap:8px;flex-wrap:wrap"><select id="noteWorker">'+actives().map(function(w){return '<option>'+esc(w.name)+'</option>';}).join("")+'</select>'+
 '<input type="text" id="noteText" placeholder="Functional note, for example: duties confirmed manageable" style="flex:1;min-width:220px">'+
 '<button class="btn gold" onclick="addNote()">Add note</button></div></div>';
 h+=S.notes.map(function(n){return '<div class="notecard"><div class="meta">'+esc(n.who)+' &middot; '+esc(n.when)+' &middot; '+esc(n.worker)+'</div>'+esc(n.text)+'</div>';}).join("");
 return h;}
function addNote(){
 var w=document.getElementById("noteWorker").value,t=document.getElementById("noteText").value.trim();
 if(!t)return;S.notes.unshift({who:"K. Morgan",when:"Jun 29, 2026",worker:w,text:t});toast("Note added");save();}
function renderReports(){
 var h=pagehead("Analytics","Reports","Period summary, export ready");
 h+='<div class="grid" style="grid-template-columns:repeat(3,1fr)">'+
 kpiCard("Cost impact (est.)","$"+costEst().toLocaleString("en-CA"),"&#8595; 9% vs last period")+
 kpiCard("Time loss (est.)",timeLoss()+" hrs","&#8595; 11% vs last period")+
 kpiCard("Return to work rate",rtwRate()+"%","&#8593; 6% vs last 7 days")+'</div>';
 h+='<div class="card" style="margin-top:12px"><div class="cardhead">Export</div><p style="font-size:12.5px;margin-bottom:10px">The printable report carries the overview, the worker table, and the document lifecycle, functional data only.</p><button class="btn gold" onclick="window.print()">Export PDF</button></div>';
 return h;}
function renderTrends(){
 var h=pagehead("Analytics","Trends","Six week movement across the period");
 h+='<div class="grid" style="grid-template-columns:1fr 1fr">'+
 '<div class="card"><div class="cardhead">Injuries over time</div>'+multiline([{v:[8,7,7,6,5,5],c:"#C8972F"},{v:[33,32,31,30,29,28],c:"#1F3557"},{v:[10,13,16,19,22,25],c:"#3E9A64"}],420,190,MONTHS)+'</div>'+
 '<div class="card"><div class="cardhead">Return to work rate</div>'+multiline([{v:[64,67,70,72,74,rtwRate()],c:"#3E9A64",fill:true}],420,190,MONTHS)+'</div>'+
 '<div class="card"><div class="cardhead">Avg days injured</div>'+multiline([{v:[29,28,27,26,25,avgDays()],c:"#1F3557"}],420,190,MONTHS)+'</div>'+
 '<div class="card"><div class="cardhead">Doctor visits per week</div>'+multiline([{v:[6,9,7,12,10,14],c:"#C8972F"}],420,190,MONTHS)+'</div>'+
 '</div>';
 return h;}
function renderBenchmarking(){
 var h=pagehead("Analytics","Benchmarking","Your recovery duration against the national baseline");
 var mine=avgDays();
 h+='<div class="card bars"><div class="cardhead">Average claim duration</div>'+
 '<div class="brow"><div class="bl"><b>Sample Employer Co. (with Continuum)</b><span>'+mine+' days</span></div><div class="bt"><i style="width:'+Math.round(mine/63*100)+'%;background:#C8972F"></i></div></div>'+
 '<div class="brow"><div class="bl"><b>National lost-time baseline</b><span>63 days</span></div><div class="bt"><i style="width:100%;background:#9AA5B4"></i></div></div>'+
 '<p style="font-size:12.5px;margin-top:10px">Every day below the baseline is premium, wage replacement, and coverage cost avoided. The instrumentation behind this figure records real durations from day one, so the claim is provable, never speculative.</p></div>';
 return h;}
function adminCard(title,rows){return '<div class="card" style="margin-bottom:12px"><div class="cardhead">'+title+'</div>'+rows.map(function(r){return '<div class="admin-row"><div><b style="font-size:12.5px">'+r[0]+'</b><div style="color:var(--muted);font-size:11.5px">'+r[1]+'</div></div><span class="pill'+(r[2]?"":" off")+'">'+(r[2]?"active":"off")+'</span></div>';}).join("")+'</div>';}
function renderUsers(){
 return pagehead("Admin","Users &amp; Roles","Who can see this workspace")+
 adminCard("Workspace members",[["K. Morgan &middot; Employer admin","Full functional view, confirms returns",true],["Site HSE (2 seats)","Duty assignment, scores visible for operational need",true],["Finance (read only)","Cost and time loss summaries",true]])+
 '<div class="card"><div class="cardhead">Role law</div><p style="font-size:12.5px">Employer roles never carry pain scores, diagnosis, notes, or photos. That rule is enforced below the interface, in what each role\'s view can read at all.</p></div>';}
function renderSettings(){
 return pagehead("Admin","Settings","Workspace configuration")+
 adminCard("Notifications",[["Weekly summary email","Mondays 7:00","true"?true:true],["New injury alert","Immediate",true],["Review reminders","48 hours ahead",true]])+
 adminCard("Data",[["Retention schedule","Per custodian direction and statute",true],["Export on request","Right of access supported",true]]);}
function renderIntegrations(){
 return pagehead("Admin","Integrations","Works with the systems you already run")+
 adminCard("Connected",[["Safety platform intake","Incident opens the case automatically",true],["Clinical provider","Nexus Health clearances and restrictions",true]])+
 adminCard("Available",[["Payroll export","Time loss to payroll codes",false],["SSO","Single sign on for dashboard roles",false]])+
 '<div class="card"><div class="cardhead">Posture</div><p style="font-size:12.5px">Continuum runs standalone; integration adds value without being required.</p></div>';}
/* ---------- render ---------- */
function render(){
 renderSide();
 var m=document.getElementById("main"),sec=S.section;
 var views={overview:renderOverview,workers:renderWorkers,claims:renderClaims,rtw:renderRtw,visits:renderVisits,notes:renderNotes,reports:renderReports,trends:renderTrends,benchmarking:renderBenchmarking,users:renderUsers,settings:renderSettings,integrations:renderIntegrations};
 m.innerHTML=(views[sec]||renderOverview)();
 var si=document.querySelector('input[type=search]');
 if(si&&S.section==="workers"){si.focus();si.setSelectionRange(si.value.length,si.value.length);}
}
load();render();
readBridge();
window.addEventListener("storage",function(e){ if(e.key==="continuum_worker_bridge_v1") readBridge(); });
window.addEventListener("focus",readBridge);
document.addEventListener("visibilitychange",function(){ if(!document.hidden) readBridge(); });
</script>
</body>
</html>
