<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Continuum worker app demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--navy:#0E1B2C;--panel:#16243B;--panel2:#1C2C47;--line:#27395A;--ink:#E9EEF6;--muted:#9AA9BF;--gold:#C8972F;--goldsoft:#E3B85C;--good:#6FBF8F;--chipbg:#122036}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:var(--navy);color:var(--ink);font:15px/1.55 Inter,system-ui,sans-serif;-webkit-font-smoothing:antialiased;overflow:hidden;position:relative}
.orbs{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
.orb{position:absolute;border-radius:50%;filter:blur(20px);opacity:.5}
.orb.a{width:260px;height:260px;left:-50px;top:40px;background:radial-gradient(circle at 30% 30%,var(--gold),transparent 70%);animation:drift1 18s ease-in-out infinite}
.orb.b{width:240px;height:240px;right:-40px;bottom:60px;background:radial-gradient(circle at 30% 30%,#2E5A8C,transparent 70%);animation:drift2 22s ease-in-out infinite}
@keyframes drift1{0%,100%{transform:translate(0,0)}33%{transform:translate(40px,30px)}66%{transform:translate(-10px,-20px)}}
@keyframes drift2{0%,100%{transform:translate(0,0)}33%{transform:translate(-30px,-25px)}66%{transform:translate(20px,15px)}}
.phone{position:relative;z-index:1;max-width:420px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;padding:22px 20px 12px}
.kick{color:var(--gold);font-family:"Space Grotesk";font-weight:600;font-size:11px;letter-spacing:.12em;text-transform:uppercase}
h1,h2,h3{font-family:"Space Grotesk";font-weight:700}
.card{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:18px;margin-bottom:14px}
.badge{display:inline-block;font-family:"Space Grotesk";font-size:11px;font-weight:600;background:var(--chipbg);border:1px solid var(--line);border-radius:999px;padding:4px 10px;color:var(--muted)}
.btn{width:100%;min-height:48px;border:none;border-radius:12px;background:var(--gold);color:#14100a;font-family:"Space Grotesk";font-weight:600;font-size:15px;cursor:pointer}
.btn:hover{background:var(--goldsoft)}
.btn.ghost{background:transparent;border:1px solid var(--line);color:var(--ink);font-family:Inter;font-weight:500}
.btn:disabled{opacity:.4;cursor:not-allowed}
.note{color:var(--muted);font-size:12px}
label.sl{display:flex;justify-content:space-between;font-weight:600;font-size:14px;margin-top:12px}
label.sl b{color:var(--gold);font-family:"Space Grotesk";font-size:18px}
input[type=range]{width:100%;accent-color:var(--gold);height:40px}
textarea{width:100%;background:var(--chipbg);border:1px solid var(--line);border-radius:10px;color:var(--ink);padding:10px;font:inherit;min-height:52px;margin-top:10px}
.ring-wrap{position:relative;width:132px;height:132px;margin:0 auto}
.ring-c{transition:stroke-dashoffset 1.1s cubic-bezier(.2,.8,.2,1)}
.ring-mid{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring-mid .d{font-family:"Space Grotesk";font-size:26px;font-weight:700}
.esc{border:1px solid var(--gold);background:rgba(200,151,47,.08);border-radius:14px;padding:12px 14px;margin-bottom:12px;animation:breathe 2.4s ease-in-out infinite}
.esc h3{color:var(--gold);font-size:14px}
@keyframes breathe{0%,100%{box-shadow:0 0 0 rgba(200,151,47,0)}50%{box-shadow:0 0 22px rgba(200,151,47,.45)}}
.duty{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:11px 0;border-bottom:1px solid var(--line)}
.duty:last-child{border-bottom:none}
.duty.done span{text-decoration:line-through;color:var(--muted)}
.duty button{min-height:44px;min-width:64px;border:1px solid var(--line);border-radius:10px;background:var(--gold);color:#14100a;font-weight:600;cursor:pointer}
.duty.done button{background:transparent;color:var(--muted)}
.hint{color:var(--goldsoft);font-size:12px;margin-top:8px}
footer{position:relative;z-index:1;max-width:420px;margin:0 auto;padding:12px 20px 20px;text-align:center;color:var(--muted);font-size:11.5px}
footer a{color:var(--muted)}
.tools{display:flex;gap:16px;justify-content:center;margin-top:6px}
.tools button{background:none;border:none;color:var(--muted);font-size:12px;text-decoration:underline dotted;cursor:pointer}
:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
@media(prefers-reduced-motion:reduce){.orb,.esc{animation:none}}
/* 12g responsive synchronism: at 880+ the app view becomes a 1024 two column layout; below 880 the phone column is unchanged (keeps the 12d iframe pixel identical). Consent stays centered. */
@media(min-width:880px){
  .phone.v-app{max-width:1024px;display:grid;grid-template-columns:400px 1fr;column-gap:18px;row-gap:0;align-content:start}
  .phone.v-app .c-head,.phone.v-app .c-hi,.phone.v-app .esc,.phone.v-app .c-foot{grid-column:1 / -1}
  .phone.v-app .c-status{grid-column:1;align-self:start}
  .phone.v-app .c-checkin,.phone.v-app .c-duties{grid-column:2}
}
</style>
</head>
<body>
<div class="orbs"><div class="orb a"></div><div class="orb b"></div></div>
<div class="phone" id="app"></div>
<footer>
  <div>Demo only. Nothing you enter is sent or stored. Synthetic case, no real worker.</div>
  <div style="margin-top:6px"><a href="/privacy">Privacy Policy</a> &nbsp;&middot;&nbsp; <a href="/terms">Terms of Service</a></div>
  <div class="tools"><button id="revoke">Revoke consent</button><button id="reset">Reset demo</button></div>
</footer>
<script>
"use strict";
var RESTRICTION = "No lifting above shoulder height";
function seed(){
  return {
    view:"consent", day:9, prognosis:21, count:0, pain:3, mobility:6,
    escalated:false, notes:"",
    duties:[
      {id:1, task:"Ground-level material staging", done:true},
      {id:2, task:"Tool crib inventory and tagging", done:false},
      {id:3, task:"Toolbox talk delivery", done:false}
    ]
  };
}
var S = seed();
function esc(t){return String(t).replace(/[&<>"]/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];});}
function slot(){return S.count>=2?"done":S.count===1?"PM":"AM";}

function grantConsent(){ S.view="app"; render(); }
function saveCheckin(){
  if(slot()==="done") return;
  S.count++;
  if(S.pain>=8) S.escalated=true;
  S.notes="";
  render();
}
function nextDay(){ if(S.day<S.prognosis) S.day++; S.count=0; S.escalated=false; S.pain=3; S.mobility=6; render(); }
function toggleDuty(id){ var d=S.duties.find(function(x){return x.id===id;}); if(d) d.done=!d.done; render(); }
function reset(){ S=seed(); render(); }
function revokeConsent(){ S.view="consent"; render(); }

function ring(){
  var R=50, C=2*Math.PI*R, prog=Math.min(1,S.day/S.prognosis);
  var off=C*(1-prog);
  return '<div class="ring-wrap">'+
    '<svg width="132" height="132" style="transform:rotate(-90deg)">'+
    '<circle cx="66" cy="66" r="'+R+'" stroke="var(--line)" stroke-width="10" fill="none"></circle>'+
    '<circle class="ring-c" cx="66" cy="66" r="'+R+'" stroke="var(--gold)" stroke-width="10" fill="none" stroke-linecap="round" stroke-dasharray="'+C+'" stroke-dashoffset="'+C+'" data-off="'+off+'"></circle>'+
    '</svg>'+
    '<div class="ring-mid"><div class="d">Day '+S.day+'</div><div class="note">of '+S.prognosis+'</div></div>'+
  '</div>';
}

/* 13b: functional-only bridge writer. No pain, mobility, or notes field, so the
   employer dashboard never ingests clinical detail even in memory. */
function writeBridge(){
  var bridge = {
    source:"embed", name:"Marcus Bedard", trade:"Scaffolder", injury:"Right shoulder strain",
    restr:RESTRICTION, day:S.day, prognosisDays:S.prognosis,
    status: S.escalated ? "escalated" : "light_duty", escalated: !!S.escalated,
    checkedInToday: S.count>=1,
    dutiesDone: S.duties.filter(function(d){return d.done;}).length,
    dutiesTotal: S.duties.length,
    consented: S.view==="app", ts: Date.now()
  };
  try{ localStorage.setItem("continuum_worker_bridge_v1", JSON.stringify(bridge)); }catch(e){}
}
function render(){
  var app=document.getElementById("app");
  app.className = "phone " + (S.view==="consent" ? "v-consent" : "v-app");
  writeBridge();
  if(S.view==="consent"){
    app.innerHTML =
      '<div class="kick">Before we start</div>'+
      '<h1 style="font-size:26px;margin:8px 0 16px">Your privacy, in plain words</h1>'+
      '<div class="card">'+
      '<p style="margin-bottom:10px"><b>Your employer</b> sees what you can do at work. Never your pain scores or notes.</p>'+
      '<p style="margin-bottom:10px"><b>Your clinician</b> sees everything, so they can help you recover.</p>'+
      '<p style="margin-bottom:10px"><b>WCB</b> receives the required paperwork at three points in your claim.</p>'+
      '<p><b>Continuum</b> manages this for you. It is not your medical record.</p>'+
      '</div>'+
      '<button class="btn" id="agree">I agree, let us go</button>'+
      '<p class="note" style="margin-top:12px">This is a demo. Nothing you enter is sent or stored.</p>';
    return;
  }
  var doneToday = slot()==="done";
  app.innerHTML =
    '<div class="c-head" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">'+
      '<div style="font-family:\'Space Grotesk\';font-weight:700;font-size:17px">Contin<span style="color:var(--gold)">uum</span></div>'+
      '<span class="badge">Light duty</span>'+
    '</div>'+
    '<h2 class="c-hi" style="font-size:24px;margin:4px 0 12px">Hi Marcus</h2>'+
    (S.escalated ?
      '<div class="esc"><h3>Your care team is taking a closer look</h3><p class="note" style="margin-top:4px">Your recent check-in asked for attention. Your clinician has been told. Keep checking in as normal.</p></div>' : '')+
    '<div class="card c-status">'+
      '<div class="kick">Your recovery</div>'+
      '<h3 style="font-size:18px;margin:4px 0 12px">Right shoulder injury</h3>'+
      ring()+
      '<p class="note" style="text-align:center;margin-top:10px">Work limit right now: '+esc(RESTRICTION)+'</p>'+
    '</div>'+
    (doneToday ?
      '<div class="card c-checkin"><h3 style="font-size:16px">Both check-ins done today</h3><p class="note" style="margin-top:4px">Nice work. Move time forward to check in again.</p>'+
      '<button class="btn ghost" id="nextday" style="margin-top:12px">Next day</button></div>'
      :
      '<div class="card c-checkin">'+
        '<div class="kick">'+slot()+' check-in</div>'+
        '<label class="sl">How is your pain? <b id="pv">'+S.pain+'</b></label>'+
        '<input type="range" min="0" max="10" value="'+S.pain+'" id="pain">'+
        '<label class="sl">How is your movement? <b id="mv">'+S.mobility+'</b></label>'+
        '<input type="range" min="0" max="10" value="'+S.mobility+'" id="mob">'+
        '<textarea id="notes" placeholder="Anything you want your clinician to know? (optional)">'+esc(S.notes)+'</textarea>'+
        '<button class="btn" id="save" style="margin-top:12px">Save check-in</button>'+
        '<p class="hint">Try sliding pain to 8 and saving, then watch what your care team sees.</p>'+
      '</div>')+
    '<div class="card c-duties">'+
      '<div class="kick">Light duties</div>'+
      '<p class="note" style="margin:6px 0 8px">Your limit: '+esc(RESTRICTION)+'</p>'+
      S.duties.map(function(d){return '<div class="duty'+(d.done?" done":"")+'"><span>'+esc(d.task)+'</span><button data-duty="'+d.id+'">'+(d.done?"Undo":"Done")+'</button></div>';}).join("")+
    '</div>'+
    '<p class="note c-foot">Only your clinician sees your scores and notes. Your employer sees your work status only.</p>';

  requestAnimationFrame(function(){
    var c=app.querySelector(".ring-c");
    if(c) c.setAttribute("stroke-dashoffset", c.getAttribute("data-off"));
  });
}

document.addEventListener("click", function(e){
  var t=e.target;
  if(t.id==="agree") grantConsent();
  else if(t.id==="save") saveCheckin();
  else if(t.id==="nextday") nextDay();
  else if(t.id==="reset") reset();
  else if(t.id==="revoke") revokeConsent();
  else if(t.getAttribute && t.getAttribute("data-duty")) toggleDuty(+t.getAttribute("data-duty"));
});
document.addEventListener("input", function(e){
  if(e.target.id==="pain"){ S.pain=+e.target.value; var pv=document.getElementById("pv"); if(pv) pv.textContent=S.pain; }
  else if(e.target.id==="mob"){ S.mobility=+e.target.value; var mv=document.getElementById("mv"); if(mv) mv.textContent=S.mobility; }
  else if(e.target.id==="notes"){ S.notes=e.target.value; }
});
render();
</script>
</body>
</html>
