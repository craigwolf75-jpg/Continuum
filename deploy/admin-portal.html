// Pure merge: filter the whole batch against the pre-merge watermark, sort, advance after.
// Fixes the defect where advancing the watermark mid-loop dropped earlier-ts entries in a batch.
function olympusMerge(batch,watermark){
 var wm=watermark||0;
 var fresh=batch.filter(function(e){return e&&typeof e.ts==="number"&&e.ts>wm;});
 fresh.sort(function(a,b){return a.ts-b.ts;});
 var nw=fresh.reduce(function(m,e){return e.ts>m?e.ts:m;},wm);
 return {fresh:fresh,watermark:nw};
}
function ingestOlympus(){
 var raw=null;try{raw=localStorage.getItem(FEEDKEY);}catch(e){}
 var batch=[];if(raw){try{batch=JSON.parse(raw);}catch(e){}}
 if(!Array.isArray(batch))return;
 var res=olympusMerge(batch,S.olympus.watermark);
 if(!res.fresh.length)return;
 res.fresh.forEach(function(e){
  if(e.kind==="concern"){S.olympus.concerns.push({ts:e.ts,agent:e.agent,kind:"concern",severity:e.severity||"note",status:"open",msg:e.msg});}
  else{S.olympus.feed.push({ts:e.ts,agent:e.agent,type:e.type||"update",msg:e.msg});}
 });
 S.olympus.watermark=res.watermark;
 save();
}

function olyBlocking(){return olyOpen().some(function(c){return c.severity==="blocking";});}
function olyWorking(){return ROSTER.filter(function(a){return a.status==="working"||a.status==="coordinating";}).length;}
function olyLast(){return (S.olympus&&S.olympus.feed?S.olympus.feed:[]).slice().sort(function(a,b){return b.ts-a.ts;})[0]||null;}
function ackConcern(ts){var c=S.olympus.concerns.find(function(x){return x.ts===ts;});if(!c||c.status!=="open")return;c.status="acknowledged";audit("Olympus: acknowledged "+c.agent+"'s concern");toast("Concern <b>acknowledged</b>");save();}
function resolveConcern(ts){var c=S.olympus.concerns.find(function(x){return x.ts===ts;});if(!c||c.status==="resolved")return;c.status="resolved";audit("Olympus: resolved "+c.agent+"'s concern");toast("Concern <b>resolved</b>");save();}

  '</div>';
 h+='<h2 style="margin:6px 0 8px">Roster</h2><div class="oly-roster">'+
  ROSTER.map(function(a){return '<div class="oly-agent'+(a.zeus?" zeus":"")+'"><div style="display:flex;justify-content:space-between;align-items:center;gap:8px"><span class="an">'+esc(a.name)+'</span><span class="oly-st '+a.status+'">'+a.status+'</span></div><div class="al">'+esc(a.lane)+'</div><div class="am">'+esc(a.mission)+'</div></div>';}).join("")+
  '</div>';
 h+='<div class="card" style="padding:18px;margin-bottom:16px"><h2 style="margin-bottom:4px">Concerns</h2><p class="sub" style="font-size:12px;margin-bottom:12px">Blocking concerns are the human gate made visible: agents wait here rather than proceeding, even on a schedule.</p>'+
  S.olympus.concerns.slice().sort(function(a,b){return b.ts-a.ts;}).map(function(c){var done=c.status==="resolved";
   return '<div class="oly-con'+(c.severity==="blocking"&&!done?" blk":"")+(done?" done":"")+'"><div class="ch"><div><b>'+esc(c.agent)+'</b> <span class="oly-sev '+c.severity+'">'+c.severity+'</span> <span class="oly-cstat">'+c.status+'</span></div><div>'+
   (c.status==="open"?'<button class="btn ghost" style="padding:6px 10px;font-size:11px" onclick="ackConcern('+c.ts+')">Acknowledge</button> ':"")+
   (done?'':'<button class="btn'+(c.severity==="blocking"?" danger":" ghost")+'" style="padding:6px 10px;font-size:11px" onclick="resolveConcern('+c.ts+')">Resolve</button>')+
   '</div></div><div class="am" style="margin-top:6px">'+esc(c.msg)+'</div></div>';}).join("")+
  '</div>';
 h+='<div class="card oly-feed" style="padding:18px;margin-bottom:16px"><h2 style="margin-bottom:8px">Activity feed</h2>'+
  S.olympus.feed.slice().sort(function(a,b){return b.ts-a.ts;}).map(function(e){
   return '<div class="fe"><div class="oly-fi"><span class="msym">'+(OLY_ICON[e.type]||"bolt")+'</span></div><div class="oly-fe-b"><div class="oly-fe-h"><b>'+esc(e.agent)+'</b><span class="oly-fe-t">'+esc(e.type)+'</span></div><div class="oly-fe-m">'+esc(e.msg)+'</div></div></div>';}).join("")+
  '</div>';
 h+='<div class="card" style="padding:18px"><h2 style="margin-bottom:6px">Feed key and wire format <span class="prov sys">System computed</span></h2><p class="sub" style="font-size:12px">The portal merges this key on load and polls it every 5 seconds. In production the same shape flows through the admin API. Anything appending JSON here appears live.</p>'+
  '<div class="oly-schema">key      '+FEEDKEY+'\nupdate   { ts, agent, type, msg }        type: update | handoff | gate | ship | finding\nconcern  { ts, agent, kind:"concern", severity, msg }    severity: blocking | process | note\nMerged against a watermark; entries at or below the last-seen ts are not re-ingested.</div>'+
  '</div>';
 return h;
}
function render(){
 renderNav();
 var views={dashboard:renderDashboard,olympus:renderOlympus,tenants:renderTenants,users:renderUsers,grants:renderGrants,billing:renderBilling,audit:renderAudit,settings:renderSettings};
 document.getElementById("main").innerHTML=(views[S.section]||renderDashboard)();
}
load();render();ingestOlympus();setInterval(ingestOlympus,5000);
</script>
</body>
</html>
